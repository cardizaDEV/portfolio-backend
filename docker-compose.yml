version: "3.9"

services:
  postgres:
    image: postgres:16
    container_name: portfolio-db
    restart: always
    environment:
      POSTGRES_DB: portfolio
      POSTGRES_USER: 1234
      POSTGRES_PASSWORD: 1234
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U 1234"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres-data: